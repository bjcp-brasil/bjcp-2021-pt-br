name: Deploy static content to Pages

# .tex na raiz do repositório é a única fonte da verdade (é dele que o PDF é
# gerado). website/scripts/generate-docs.mjs converte tex -> markdown via
# pandoc aqui no CI (nunca commitado) e o Docusaurus builda o site em cima
# disso. Ver website/README.md para detalhes do pipeline.
on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: website/package-lock.json

      - name: Gerar Markdown a partir dos .tex (fonte original)
        run: node website/scripts/generate-docs.mjs

      - name: Instalar dependências
        working-directory: website
        run: npm ci

      - name: Build do site
        working-directory: website
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
